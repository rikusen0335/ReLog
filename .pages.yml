media:
  - name: images # Note: 'name' key is required here
    label: 画像
    input: public/assets/images
    output: /files/images
    extensions: [ png, jpg, jpeg, gif, svg, webp ]
  - name: files
    label: ファイル
    input: public/assets/documents
    output: /files/documents
    categories: [ document ]
content:
  - name: posts
    label: 記事
    path: _contents/posts
    type: collection
    filename: '{year}-{month}-{day}-{primary}.mdx'
    fields:
      - { name: cover-image, label: カバー画像, type: image, required: false }
      - { name: title, label: タイトル, type: string, required: true }
      - { name: excerpt, label: 短文説明, type: string, required: false }
      - { name: publish-date, label: 投稿日時, type: date, required: true, options: { time: true, format: yyyy-MM-dd'T'HH:mm:ss'+09:00'} }
      - { name: update-date, label: 更新日時, type: date, required: false, options: { time: true, format: yyyy-MM-dd'T'HH:mm:ss'+09:00'} }
      - { name: public, label: 公開する, type: boolean, default: true }
      - name: authors
        label: 著者
        type: reference
        options:
          collection: authors
      - name: tags
        label: タグ
        type: reference
        options:
          collection: tags
          multiple: true
      - { name: body, label: 本文, type: rich-text, required: true }
  - name: authors
    label: 著者
    path: _contents/authors
    type: collection
    fields:
      - name: name
        label: 名前
        type: string
      - name: picture
        label: アイコン
        type: image
        options:
          media: images
  - name: tags
    label: タグ
    path: _contents/tags
    type: collection
    fields:
      - name: name
        label: 名前
        type: string
      - name: picture
        label: アイコン
        type: image
        options:
          media: images